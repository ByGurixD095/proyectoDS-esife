<div class="search-bar">
  <div class="search-bar__inner">
    <svg class="search-bar__icon" width="18" height="18" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      class="search-bar__input"
      type="text"
      placeholder="Busca artistas, espectáculos, ciudades…"
      [value]="query()"
      (input)="onInput($any($event.target).value)"
      aria-label="Buscar espectáculos"
    />
    @if (query()) {
      <button class="search-bar__clear" (click)="onClear()" aria-label="Limpiar búsqueda">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    }
  </div>
</div>
