<div class="view-toggle" role="group" aria-label="Modo de vista">
  <button
    class="view-toggle__btn"
    [class.view-toggle__btn--active]="eventService.viewMode() === 'by-event'"
    (click)="setMode('by-event')"
  >
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    Por espectáculo
  </button>
  <button
    class="view-toggle__btn"
    [class.view-toggle__btn--active]="eventService.viewMode() === 'by-venue'"
    (click)="setMode('by-venue')"
  >
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Por recinto
  </button>
</div>
